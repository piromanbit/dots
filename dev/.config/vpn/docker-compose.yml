version: "3.8"
services:
  sing-box:
    image: ghcr.io/sagernet/sing-box:latest
    ports:
      - "2027:2026"
      - "443:443"
    container_name: sing-box
    restart: always
    volumes:
      - ./configs/local-client.json:/etc/sing-box/config.json
    command: -D /var/lib/sing-box -C /etc/sing-box run
