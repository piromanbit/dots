; GitHub dotfiles: wm/.config/gammastep/config.ini
; Docs: man gammastep — temps (K): lower = warmer; brightness 0.1–1.0
;
; Schedule (local clock): transitions between day and night. Edit times here.
; Alternative: comment dawn-time/dusk-time and rely on [manual] lat/lon + sun only.

[general]
adjustment-method=wayland
fade=1

temp-day=6500
temp-night=3200

brightness-day=1.0
brightness-night=0.3

dawn-time=08:00-09:00
dusk-time=19:00-20:30

location-provider=manual

[manual]
lat=55.75
lon=37.62
