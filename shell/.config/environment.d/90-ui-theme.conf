# Unified dark UI (GTK + Qt). Picked up by systemd user session on login — relogin after stowing.
#
# GTK theme "Gruvbox-Material-Dark-medium" is NOT in official Arch repos. Install e.g.:
#   yay -S gruvbox-material-gtk-theme-git
# Optional matching icons:
#   yay -S gruvbox-material-icon-theme-git
#   → then set gtk-icon-theme-name to Gruvbox-Material-Dark in gtk-*/settings.ini
#
# Flatpak apps (some Cursor builds): after themes exist on the host:
#   flatpak override --user --filesystem=xdg-config/gtk-3.0:ro --filesystem=xdg-config/gtk-4.0:ro
#   flatpak override --user --env=GTK_THEME=Gruvbox-Material-Dark-medium
#
# Cursor (.deb / official): should inherit these vars; if dialogs stay light, try launching with
#   --enable-features=UseOzonePlatform --ozone-platform=wayland
# and ensure this file is loaded (full session restart).

GTK_THEME=Gruvbox-Material-Dark-medium
GTK2_RC_FILES=${HOME}/.gtkrc-2.0

QT_QPA_PLATFORMTHEME=qt6ct
QT_QPA_PLATFORMTHEME_qt5=qt5ct

XCURSOR_THEME=Adwaita
XCURSOR_SIZE=24
